version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: medikita_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: medikita
      POSTGRES_PASSWORD: medikita
      POSTGRES_DB: medikita
    ports:
      - "5432:5432"
    volumes:
      - medikita_pgdata:/var/lib/postgresql/data

volumes:
  medikita_pgdata:
